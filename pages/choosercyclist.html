<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Cyclists</title>
    <link rel="stylesheet" href="/styles/choose_cyclist.css">
</head>

<body>

    <main>

        <section id="players">
            <div id="tablesContainer">
                <div class="table-box">
                    <input id="p1" placeholder="Player 1" required>
                
                    <div class="divider"></div>
                
                    <ul class="player-list active-list"></ul>
                
                    <div class="divider small"></div>
                
                    <ul class="player-list benched-list"></ul>
                </div>

                <div class="table-box">
                    <input id="p2" placeholder="Player 1" required>
                
                    <div class="divider"></div>
                
                    <ul class="player-list active-list"></ul>
                
                    <div class="divider small"></div>
                
                    <ul class="player-list benched-list"></ul>
                </div>

                <div class="table-box">
                    <input id="p3" placeholder="Player 1" required>
                
                    <div class="divider"></div>
                
                    <ul class="player-list active-list"></ul>
                
                    <div class="divider small"></div>
                
                    <ul class="player-list benched-list"></ul>
                </div>

                <div class="table-box">
                    <input id="p4" placeholder="Player 1" required>
                
                    <div class="divider"></div>
                
                    <ul class="player-list active-list"></ul>
                
                    <div class="divider small"></div>
                
                    <ul class="player-list benched-list"></ul>
                </div>
            </div>

            <button id="playerbutton">Start</button>
        </section>

        <section id="cyclistSelector" class="hidden">
            <h2>Beurt: <span id="currentPlayer">-</span></h2>
            <ul id="cyclistList"></ul>
        </section>

    </main>

    <script type="module" src="/js/choosercyclist.js"></script>

</body>

</html>
